<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/feather-icons"></script>

  <title>Sistem Informasi Absensi Mahasiswa</title>
</head>

<body>

  <a href="role.html"><img src="img/arrow-left.svg" id="back-button"></a>

  <section class="text-center" id="container-login-mahasiswa">
    <img src="img/logo-profile.jpeg" alt="Logo Unima" class="rounded-circle" id="logo-profile">

    <div class="d-grid gap-2 col-6 mx-auto">
      <div class="input-group flex-nowrap align-items-center">
        <span class="input-group-text" id="addon-wrapping"><i data-feather="user"></i></span>
        <input type="text" class="form-control" placeholder="Username" aria-label="Username"
          aria-describedby="addon-wrapping">
      </div>
      <div class="input-group flex-nowrap">
        <span class="input-group-text" id="addon-wrapping"><i data-feather="lock"></i></span>
        <input type="password" class="form-control" placeholder="Password" aria-label="Username"
          aria-describedby="addon-wrapping">
      </div>
    </div>
  </section>

  <div class="" id="container">
    <a href="dashboard-dosen.html"><button id="button-login" class="btn btn-primary d-grid gap-2 col-6 mx-auto"
        type="button">Log
        in</button></a>
  </div>

  <script>
    feather.replace();
  </script>

</html>
