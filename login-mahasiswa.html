<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistem Informasi Absensi Mahasiswa</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

  <script src="https://unpkg.com/feather-icons"></script>

  <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body>

  <a href="../auth/role.html"><img src="../assets/img/arrow-left.svg" id="back-button"></a>

  <section class="text-center" id="container-login-mahasiswa">
    <img src="../assets/img/logo-profile.jpeg" alt="Logo Unima" class="rounded-circle" id="logo-profile">

    <div class="d-grid gap-2 col-6 mx-auto">
      <div class="input-group flex-nowrap align-items-center">
        <span class="input-group-text" id="addon-wrapping"><i data-feather="user"></i></span>
        <input type="text" class="form-control" placeholder="Username" aria-label="Username"
          aria-describedby="addon-wrapping">
      </div>
      <div class="input-group flex-nowrap">
        <span class="input-group-text" id="addon-wrapping"><i data-feather="lock"></i></span>
        <input type="password" class="form-control" placeholder="Password" aria-label="Username"
          aria-describedby="addon-wrapping">
      </div>
    </div>
  </section>

  <div class="" id="container">
    <a href="../mahasiswa/dashboard-mahasiswa.html"><button id="button-login"
        class="btn btn-primary d-grid gap-2 col-6 mx-auto" type="button">Log
        in</button></a>
    <a href="regis.html"><button id="button-registrasi" class="btn btn-primary d-grid gap-2 col-6 mx-auto"
        type="button">Registrasi</button></a>
  </div>

  <script>
    feather.replace();
  </script>

</body>

</html>
